name: Gerar APK Motoboy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'android-motoboy/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK Android necessário
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar APK debug instalável
        run: gradle -p android-motoboy assembleDebug --stacktrace

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: pizzaria-motoboy-apk-debug
          path: android-motoboy/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
